<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    padding:0;
    background:#f4f7fc;
    font-family:Arial, Helvetica, sans-serif;
}

.header{
    text-align:center;
    padding:30px 20px;
}

.logo{
    width:180px;
    height:auto;
}

h1{
    color:#b00020;
    font-size:32px;
    margin:15px 0 5px;
}

h2{
    color:#333;
    font-size:22px;
    margin:0;
}

h3{
    color:#0066cc;
    margin-top:10px;
    font-weight:normal;
}

.login-box{
    width:350px;
    margin:30px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#b00020;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#8a0018;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
    font-size:14px;
}
</style>

</head>

<body>

<div class="header">

    <img src="college-logo.png" alt="College Logo" class="logo">

    <h1>ADHIPARASAKTHI ENGINEERING COLLEGE</h1>

    <h2>Melmaruvathur - 603319</h2>

    <h3>Student Login Portal</h3>

</div>

<div class="login-box">

    <input type="text" placeholder="Register Number / Email">

    <input type="password" placeholder="Password">

    <button>Login</button>

</div>

<div class="footer">

© 2026 Adhiparasakthi Engineering College

</div>

</body>
</html>
